name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        working-directory: backend
        run: dotnet restore Simulyn.Api/Simulyn.Api.csproj
      - name: Build
        working-directory: backend
        run: dotnet build Simulyn.Api/Simulyn.Api.csproj -c Release --no-restore
      - name: Test
        working-directory: backend
        run: dotnet test Simulyn.Api.Tests/Simulyn.Api.Tests.csproj -c Release --logger "console;verbosity=normal"

  ai-service:
    name: AI service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt
      - name: Install deps
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        working-directory: ai-service
        run: python -m pytest -q

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
        run: npm run build
