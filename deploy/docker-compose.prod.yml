# Production Docker Compose for Simulyn.
#
# Usage (on a Linux VPS with docker + docker compose plugin):
#   cd /opt/simulyn
#   git clone https://github.com/<you>/simulyn-ai.git .
#   cp deploy/.env.prod.example deploy/.env.prod
#   # edit deploy/.env.prod with your real secrets (domain, Groq key, DB password, etc.)
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
#
# Stack:
#   caddy   : single ingress point, auto-HTTPS via Let's Encrypt, reverse-proxies to api/web
#   web     : Next.js frontend (Simulyn UI)
#   api     : .NET 8 backend (business logic + auth + billing)
#   ai      : Python FastAPI AI service (LLM orchestration)
#   db      : PostgreSQL 16 with persistent volume
#
# All services except caddy bind only to the internal Docker network. Only the
# caddy container is reachable from the internet (ports 80/443 on the host).

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # TLS certs (do not delete this volume!)
      - caddy_config:/config
    environment:
      SIMULYN_DOMAIN: ${SIMULYN_DOMAIN:?SIMULYN_DOMAIN is required, e.g. simulyn.ai}
      SIMULYN_API_DOMAIN: ${SIMULYN_API_DOMAIN:?SIMULYN_API_DOMAIN is required, e.g. api.simulyn.ai}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required (used by Let's Encrypt for expiry notices)}
    depends_on:
      - web
      - api
    networks:
      - simulyn

  web:
    build:
      context: ../frontend
      args:
        # The browser calls the API via the public api subdomain.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required, e.g. https://api.simulyn.ai}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - simulyn

  api:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=db;Port=5432;Database=simulyn;Username=simulyn;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Jwt__Key: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required (>= 32 chars, generate with: openssl rand -base64 48)}
      Jwt__Issuer: Simulyn.Api
      Jwt__Audience: Simulyn.Clients
      Jwt__ExpiryMinutes: "10080"
      PlatformAdminEmails: ${PLATFORM_ADMIN_EMAILS:?PLATFORM_ADMIN_EMAILS is required, e.g. you@yourdomain.com}
      AiService__BaseUrl: http://ai:8000
      # Run EF migrations on startup. Safe for single-replica Render/Railway/VPS;
      # set to "false" if you scale the API beyond one replica and run migrations
      # out-of-band instead (otherwise replicas race on __EFMigrationsHistory).
      RunMigrationsOnStartup: "true"
      # Browser origin(s), comma-separated. Used for CORS. Must be https in prod.
      Frontend__Origin: https://${SIMULYN_DOMAIN}
      # Email (Resend). Leave unset to fall back to the console sender.
      # IMPORTANT: keys live under the Email__ section — earlier compose used
      # bare Resend__* keys which the .NET code never reads.
      Email__Provider: ${EMAIL_PROVIDER:-auto}
      Email__Resend__ApiKey: ${RESEND_API_KEY:-}
      Email__FromAddress: ${RESEND_FROM_ADDRESS:-Simulyn AI <noreply@simulyn.ai>}
      Email__AppUrl: https://${SIMULYN_DOMAIN}
      Sentry__Dsn: ${SENTRY_DSN_BACKEND:-}
      # Daily per-org LLM budget. Units are MILLS (1/1000 USD), not dollars —
      # earlier compose used Budget__DailyLlmUsd* which the code doesn't read.
      # Defaults: 5000 mills ($5) soft warning, 20000 mills ($20) hard block.
      Budget__SoftCapMills: ${BUDGET_SOFT_CAP_MILLS:-5000}
      Budget__HardCapMills: ${BUDGET_HARD_CAP_MILLS:-20000}
      Stripe__ApiKey: ${STRIPE_API_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      # Map plan names → Stripe Price IDs. The frontend pricing card uses
      # "Pro" (and "Enterprise" is sales-led), so configure Stripe__Prices__Pro
      # at minimum. Add more entries here when you launch new tiers.
      Stripe__Prices__Pro: ${STRIPE_PRO_PRICE_ID:-}
      Stripe__Prices__Team: ${STRIPE_TEAM_PRICE_ID:-}
      Stripe__Prices__Business: ${STRIPE_BUSINESS_PRICE_ID:-}
      Stripe__SuccessUrl: https://${SIMULYN_DOMAIN}/admin/billing?checkout=success
      Stripe__CancelUrl: https://${SIMULYN_DOMAIN}/admin/billing?checkout=cancel
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started
    networks:
      - simulyn

  ai:
    build:
      context: ../ai-service
    restart: unless-stopped
    environment:
      # Cost-saving fallback chain. Each provider is tried in order; first one
      # to answer wins. Providers without an API key are silently skipped at
      # startup, so it's safe to leave any line below blank. If everything
      # fails the AI service returns a friendly offline message instead of 500.
      #
      # Default order (override with LLM_PROVIDERS):
      #   groq → openrouter
      # Append ",huggingface,openai,anthropic" to LLM_PROVIDERS if you also
      # configure those keys. Gemini is left out by default until your GCP
      # project has billing / API access enabled (current keys return 403).
      LLM_PROVIDERS: ${LLM_PROVIDERS:-groq,openrouter}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}

      # --- Gemini (disabled by default until billing enabled) --------------
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}

      # --- Primary: Groq (fast, generous free tier) ------------------------
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.1-8b-instant}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}

      # --- Secondary: OpenRouter (multi-backend aggregator, free models) ---
      # Sign up: https://openrouter.ai/keys. Pick free models with ":free" suffix.
      # OpenRouter itself auto-fails-over between backend providers per model,
      # so this single slot is effectively a fallback-inside-a-fallback.
      # Default: DeepSeek V4 Flash — most reliable free option in our tests.
      # The 70B Llama free slot frequently returns 429 (upstream overloaded).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash:free}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-deepseek/deepseek-v4-flash:free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-https://${SIMULYN_DOMAIN:-simulyn.ai}}
      OPENROUTER_X_TITLE: ${OPENROUTER_X_TITLE:-Simulyn AI}

      # --- Tertiary: Hugging Face Inference Providers (last free resort) --
      # Sign up: https://huggingface.co/settings/tokens (kind: "Read")
      # Free tier is throttled; chat tool-calling quality varies by model.
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-meta-llama/Llama-3.3-70B-Instruct}
      HUGGINGFACE_CHAT_MODEL: ${HUGGINGFACE_CHAT_MODEL:-}
      HUGGINGFACE_BASE_URL: ${HUGGINGFACE_BASE_URL:-https://router.huggingface.co/v1}

      # --- Optional paid providers (leave blank to skip) -------------------
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}

      # Per-provider call timeout. Bumped from 15s → 30s because hosted
      # chat-completion endpoints sporadically take 8-20s under load, and
      # the chat loop calls /chat-step multiple times.
      LLM_TIMEOUT_SECS: ${LLM_TIMEOUT_SECS:-30}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-350}
      CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-1500}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=3)' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - simulyn

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: simulyn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: simulyn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulyn -d simulyn"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - simulyn

networks:
  simulyn:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
