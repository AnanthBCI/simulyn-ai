services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simulyn
      POSTGRES_PASSWORD: simulyn
      POSTGRES_DB: simulyn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulyn -d simulyn"]
      interval: 5s
      timeout: 5s
      retries: 12

  ai:
    build:
      context: ./ai-service
      args:
        # Build-time proxy so pip can reach pypi.org from behind the corporate
        # proxy. Defaults rewrite localhost:3128 → host.docker.internal:3128
        # (containers can't reach the host on "localhost").
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-http://host.docker.internal:3128}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-http://host.docker.internal:3128}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-host.docker.internal,localhost,127.0.0.1}
    ports:
      - "8000:8000"
    environment:
      # Cost-saving fallback chain. Each provider is skipped automatically if
      # its API key isn't set, so it's safe to leave any of these blank.
      # Default order: groq (fastest free) → openrouter (multi-backend) →
      # huggingface (last free resort) → ollama (local, offline-capable).
      # Gemini is left out by default until billing/project access is fixed.
      LLM_PROVIDERS: ${LLM_PROVIDERS:-groq,openrouter,huggingface,ollama}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_ENABLE_OLLAMA: ${LLM_ENABLE_OLLAMA:-1}

      # --- Gemini (currently disabled — needs billing/new GCP project) -----
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-}

      # --- Groq (primary — fastest, generous free tier) --------------------
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.1-8b-instant}

      # --- OpenRouter (best fallback — aggregates ~100 backends per model) -
      # Get key: https://openrouter.ai/keys. Free models use ":free" suffix.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://localhost:3001}
      OPENROUTER_X_TITLE: ${OPENROUTER_X_TITLE:-Simulyn AI (dev)}

      # --- Hugging Face Inference Providers (last free resort) ------------
      # Get token: https://huggingface.co/settings/tokens
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-meta-llama/Llama-3.3-70B-Instruct}
      HUGGINGFACE_CHAT_MODEL: ${HUGGINGFACE_CHAT_MODEL:-}

      # --- Optional paid providers (kept off by default) -------------------
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      # Ollama runs on the host machine — reach it via host.docker.internal.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      # Chat copilot needs tool-calling — small models (1B/3B) struggle with it.
      # llama3.1:8b and qwen2.5:7b are reliable picks. Pull first:
      #   ollama pull llama3.1:8b
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-60}
      LLM_TIMEOUT_SECS: ${LLM_TIMEOUT_SECS:-60}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-350}
      CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-700}
      # Make sure the Python LLM clients DO NOT route host.docker.internal
      # (Ollama) through the corporate proxy at runtime.
      NO_PROXY: host.docker.internal,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./backend
      args:
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-http://host.docker.internal:3128}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-http://host.docker.internal:3128}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-host.docker.internal,localhost,127.0.0.1}
    # Host port 5000 is taken on this machine, expose on 5050 instead. Keep
    # in sync with the web service's NEXT_PUBLIC_API_URL build arg below.
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Port=5432;Database=simulyn;Username=simulyn;Password=simulyn
      Jwt__Key: "Simulyn-Dev-Jwt-Signing-Key-Replace-In-Production-Min32Chars!!"
      Jwt__Issuer: Simulyn.Api
      Jwt__Audience: Simulyn.Clients
      Jwt__ExpiryMinutes: "10080"
      PlatformAdminEmails: "devadmin@example.com"
      AiService__BaseUrl: http://ai:8000
      Frontend__Origin: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started

  web:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time — must match the host
        # port the api service is exposed on.
        NEXT_PUBLIC_API_URL: http://localhost:5050
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-http://host.docker.internal:3128}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-http://host.docker.internal:3128}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-host.docker.internal,localhost,127.0.0.1}
    # Host port 3000 is held by another process on this machine, expose 3001.
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  pgdata:
