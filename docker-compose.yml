services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simulyn
      POSTGRES_PASSWORD: simulyn
      POSTGRES_DB: simulyn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulyn -d simulyn"]
      interval: 5s
      timeout: 5s
      retries: 12

  ai:
    build:
      context: ./ai-service
      args:
        # Optional: set DOCKER_BUILD_HTTP_PROXY / DOCKER_BUILD_HTTPS_PROXY in .env
        # when pip must use a corporate proxy (use host.docker.internal:3128, not localhost).
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-host.docker.internal,localhost,127.0.0.1}
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      # Ollama runs on the host machine — reach it via host.docker.internal.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      # Chat copilot needs tool-calling — small models (1B/3B) struggle with it.
      # llama3.1:8b and qwen2.5:7b are reliable picks. Pull first:
      #   ollama pull llama3.1:8b
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-60}
      LLM_TIMEOUT_SECS: ${LLM_TIMEOUT_SECS:-60}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-350}
      CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-700}
      # Make sure the Python LLM clients DO NOT route host.docker.internal
      # (Ollama) through the corporate proxy at runtime.
      NO_PROXY: host.docker.internal,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./backend
      args:
        # Set DOCKER_BUILD_HTTP_PROXY in .env only when behind a corporate proxy.
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-host.docker.internal,localhost,127.0.0.1}
    # Host port 5000 is taken on this machine, expose on 5050 instead. Keep
    # in sync with the web service's NEXT_PUBLIC_API_URL build arg below.
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Port=5432;Database=simulyn;Username=simulyn;Password=simulyn
      Jwt__Key: "Simulyn-Dev-Jwt-Signing-Key-Replace-In-Production-Min32Chars!!"
      Jwt__Issuer: Simulyn.Api
      Jwt__Audience: Simulyn.Clients
      Jwt__ExpiryMinutes: "10080"
      PlatformAdminEmails: "devadmin@example.com"
      AiService__BaseUrl: http://ai:8000
      Frontend__Origin: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started

  web:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time — must match the host
        # port the api service is exposed on.
        NEXT_PUBLIC_API_URL: http://localhost:5050
        # Set DOCKER_BUILD_HTTP_PROXY in .env only when behind a corporate proxy.
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-host.docker.internal,localhost,127.0.0.1}
    # Host port 3000 is held by another process on this machine, expose 3001.
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  pgdata:
